syntax = "proto3";

package synapse.daemon.v1;

// DaemonLink is the custom gRPC control hub for the daemon link (HTTP/2).
// The daemon ALWAYS initiates streams (outbound-only), presenting a daemon
// access token in call metadata ("authorization: Bearer <jwt>"), validated by
// a server interceptor. Delivery guarantees (at-least-once + idempotency) are
// carried at the app layer via seq/ack fields, since gRPC won't redeliver
// across a reconnect.
service DaemonLink {
  // Bidirectional control stream. The daemon pushes HITL requests, memory
  // deltas, checkpoints, and run.reconcile up; the cloud pushes commands and
  // HITL resolutions down. Daemon-initiated so the cloud reaches the daemon
  // with no inbound port on the user's machine.
  rpc Connect(stream DaemonMessage) returns (stream CloudMessage);

  // High-volume trace/metric firehose on its own HTTP/2 stream so telemetry
  // cannot head-of-line-block control or HITL.
  rpc IngestTelemetry(stream TelemetryFrame) returns (TelemetryAck);
}

// ── Daemon → Cloud (control stream) ──────────────────────────────────────────
message DaemonMessage {
  uint64 seq = 1;                  // app-level monotonic sequence (per stream)
  string daemon_id = 2;
  oneof body {
    RegisterDaemon register = 10;  // first frame after connect
    Heartbeat heartbeat = 11;
    Ack ack = 12;                  // acks a CloudMessage.seq
    Envelope event = 13;           // hitl.request, memory.delta, checkpoint,
                                   // run.reconcile, capability.status, ...
  }
}

// ── Cloud → Daemon (control stream) ──────────────────────────────────────────
message CloudMessage {
  uint64 seq = 1;                  // app-level monotonic sequence (per stream)
  oneof body {
    Ack ack = 10;                  // acks a DaemonMessage.seq
    Command command = 11;          // agent.deploy, agent.run, env.set, ...
    CloseStream close = 12;        // e.g. revocation -> UNAUTHENTICATED
  }
}

message RegisterDaemon {
  string name = 1;
  repeated string tags = 2;
  string platform = 3;
  string version = 4;
  string hostname = 5;
  string os_version = 6;
  string e2e_public_key = 7;       // X25519 pubkey for env-var sealed boxes
}

message Heartbeat {
  double cpu = 1;
  double mem = 2;
}

message Ack {
  uint64 acked_seq = 1;
  bool ok = 2;
  string error = 3;
}

// Generic typed event/command envelope. `type` is the dotted message name
// (e.g. "hitl.request", "agent.run"); `payload_json` is the JSON body;
// `idempotency_key` dedupes at-least-once delivery.
message Envelope {
  string type = 1;
  string payload_json = 2;
  string idempotency_key = 3;
  string run_id = 4;
  string agent_id = 5;
}

message Command {
  string type = 1;
  string payload_json = 2;
  string idempotency_key = 3;
}

message CloseStream {
  string reason = 1;
}

// ── Telemetry firehose (client-streaming) ────────────────────────────────────
message TelemetryFrame {
  string daemon_id = 1;
  string org_id = 2;
  string run_id = 3;
  string agent_id = 4;
  uint64 seq = 5;
  oneof body {
    LogLine log = 10;
    Metric metric = 11;
    TraceChunk trace = 12;
  }
}

message LogLine {
  string level = 1;
  string message = 2;             // redacted on-device
  string fields_json = 3;
}

message Metric {
  string name = 1;                // cost,tokens_in,tokens_out,latency_ms,...
  double value = 2;
  string labels_json = 3;
}

message TraceChunk {
  uint64 seq = 1;
  string role = 2;                // prompt | completion | tool
  string content = 3;             // redacted on-device
}

message TelemetryAck {
  uint64 frames_received = 1;
  uint64 last_seq = 2;
}
